<!DOCTYPE html>
<html lang = en>

<head> 

<title> Date Picker</title> 
<meta charset="UTF-8">
<meta name = "description" content = "TiBird's Datepicker UI">
<meta name = "keywords" content = "HTML, CSS, beginners, website, dataPicker">
<meta name = "author" content = "TiBird63">
<meta name = "viewport" content = "width=device-width, initial-scale=1.0">

<link rel ="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>

	<div class = "dataPicker" >
	
	
		<div class = "dateInput" >
		
			<input type = "text" placeholder= "dd/mm/yyyy"  class = "dateFinder">
			
			<button class ="dateButton"> <i class = "fa fa-calendar"> </i></button>
		
		</div>
		
		<div class = "calendar" >
		
			<p>&#9664  April 2026  &#9654  </p>
			<hr />
			<table class = "calInfo">
				<tr>
					<th>Sat</th>
					<th>Mon</th>
					<th>Tus</th>
					<th>Wed</th>
					<th>Thur</th>
					<th>Fri</th>
					<th>Sun</th>
				</tr>
				<tr>
					<td class= "otherMonth">29</td>
					<td class= "otherMonth">30</td>
					<td>31</td>
					<td>1</td>
					<td>2</td>
					<td>3</td>
					<td>4</td>
				</tr>
				<tr>
					<td>5</td>
					<td>6</td>
					<td>7</td>
					<td>8</td>
					<td>9</td>
					<td>10</td>
					<td>11</td>
				</tr>
				<tr>
					<td>12</td>
					<td>13</td>
					<td>14</td>
					<td>15</td>
					<td>16</td>
					<td>17</td>
					<td>18</td>
				</tr>
				<tr>
					<td>19</td>
					<td>20</td>
					<td>21</td>
					<td>22</td>
					<td>23</td>
					<td>24</td>
					<td>25</td>
				</tr>
				<tr>
					<td>26</td>
					<td>27</td>
					<td>28</td>
					<td>29</td>
					<td>30</td>
					<td class="otherMonth">1</td>
					<td class="otherMonth">2</td>
				</tr>
			</table>
		</div>
	</div>
</body>

</html>
